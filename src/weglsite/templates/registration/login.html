
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Login</title>
	<style>
		body { font-family: Arial, sans-serif; background: #f5f5f5; }
		.login-container { max-width: 400px; margin: 60px auto; background: #fff; padding: 2em; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
		h2 { text-align: center; }
		.form-group { margin-bottom: 1em; }
		label { display: block; margin-bottom: 0.5em; }
		input[type="text"], input[type="password"] { width: 100%; padding: 0.5em; border: 1px solid #ccc; border-radius: 4px; }
		button { width: 100%; padding: 0.7em; background: #007bff; color: #fff; border: none; border-radius: 4px; font-size: 1em; }
		.error { color: #b00; margin-bottom: 1em; }
	</style>
</head>
<body>
	<div class="login-container">
		<h2>Login</h2>
		{% if form.errors %}
			<div class="error">Invalid username or password.</div>
		{% endif %}
		<form method="post" action="">
			{% csrf_token %}
			<div class="form-group">
				<label for="id_username">Username:</label>
				{{ form.username }}
			</div>
			<div class="form-group">
				<label for="id_password">Password:</label>
				{{ form.password }}
			</div>
			<button type="submit">Login</button>
		</form>
	</div>
</body>
</html>
